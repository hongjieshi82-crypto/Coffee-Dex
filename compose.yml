services:
  coffee-dex:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: coffee-dex
    env_file: .env.production
    ports:
      # Nginx on the host is the only public entry point (ports 80/443).
      - "127.0.0.1:3000:3000"
    volumes:
      - coffee-dex-data:/app/data
    restart: unless-stopped

volumes:
  coffee-dex-data:
